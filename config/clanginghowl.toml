[General]
	#If 'MeteorShower' is enabled, whether Meteor Showers make flashes, Default: true
	MeteorShowerFlash = true
	#If 'TechnoFleshBuff' is set to true, whether it gains buffs via minecraft days instead of game time, Default: false
	TechnoFleshBuffDayTime = false
	#Whether Technoflesh creatures gain buffs as game time goes by, Default: true
	TechnoFleshBuff = true
	#Players camera can shake. Default: true
	CameraShake = true
	#If 'MeteorShower' is enabled, Meteor Showers will occur ever defined days, Default: 15
	#Range: > 1
	MeteorShowerDays = 15
	#If set above 0 and 'TechnoFleshBuff' is set to true, Technoflesh creatures will always be buffed as though the 'TechnoFleshBuffDayTime' is enabled and the input amount of days have passed, set to 0 to disable, Default: 0
	#Range: > 0
	FixedAdaptationStage = 0
	#If 'MeteorShower' is enabled, how many seconds do Meteor Showers lasts, Default: 180
	#Range: 1 ~ 550
	MeteorShowerDuration = 180
	#Whether Meteor Showers can occur, Default: true
	MeteorShower = true

