
#Client-side seismic projector hologram rendering.
[projectorVisuals]
	#Render hologram fill in addition to outlines.
	fillEnabled = true
	#Fill alpha channel (0-255).
	#Range: 0 ~ 255
	fillAlpha = 96
	#Outline alpha channel (0-255).
	#Range: 0 ~ 255
	edgeAlpha = 255
	#World hologram face offset from block borders. Negative expands, positive shrinks.
	#Range: -0.45 ~ 0.45
	blockEdgeInset = 0.0
	#Render dashed guide lines from the projector to detected targets.
	guideLinesEnabled = true
	#In-world projector dashed guide line thickness.
	#Range: 0.2 ~ 1.0
	guideLineWidth = 0.5
	#Maximum number of exact veins displayed at once. Closest veins are prioritized.
	#Range: 0 ~ 256
	visibleVeinsMax = 10
	#Ponder-only hologram face offset from block borders. Negative expands, positive shrinks.
	#Range: -0.45 ~ 0.45
	ponderBlockEdgeInset = 0.0
	#Ponder projector dashed guide line thickness.
	#Range: 0.2 ~ 1.0
	ponderGuideLineWidth = 0.5

#Client-side seismogram UI and projector placement guides.
[seismogramUi]
	#Show nearest signal sidebar while holding a seismogram.
	sidebarEnabled = true
	#Maximum number of nearest signals shown in the seismogram sidebar.
	#Range: 1 ~ 16
	sidebarMaxSignals = 5
	#Show triangulation invalid-distance boundary when a nearby projector has exactly one loaded node.
	boundaryOverlayEnabled = true

#Client-side camera feedback.
[camera]
	#Enable seismic camera shake effects.
	shakeEnabled = true
	#Multiplier applied to seismic camera shake intensity.
	#Range: 0.0 ~ 2.0
	shakeScale = 1.0

